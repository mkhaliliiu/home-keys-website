name: Build and Deploy HomeKeys

on:
  repository_dispatch:
    types: [sanity-update]
  push:
    branches:
      - main

jobs:
  notify-server:
    runs-on: ubuntu-latest

    steps:
      - name: Notify server to pull and build
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          curl -X POST "$DEPLOY_URL" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Secret: $DEPLOY_SECRET" \
            -d '{"action":"deploy"}' \
            --max-time 30 || echo "Notification sent"